<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Racing Dashboard — Universal Sensor Interface for the Teensy 4.1 Racing Sensor Board" />
    <meta name="theme-color" content="#06080e" />
    <title>Racing Dashboard · Sensor Interface v0.2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        overflow: hidden;
        background: #06080e;
        color: #b0bfd0;
        font-family: 'Space Grotesk', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root { height: 100%; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #0a0e18; }
      ::-webkit-scrollbar-thumb { background: #1e2d3d; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #2a3d50; }
      ::selection { background: #00C8FF22; color: #e2e8f0; }
      .mono { font-family: 'IBM Plex Mono', monospace; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
